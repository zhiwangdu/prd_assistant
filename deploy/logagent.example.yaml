server:
  bind: "0.0.0.0:50992"
  public_base_url: "http://127.0.0.1:50992"
  max_concurrent_tasks: 2

storage:
  data_dir: "${LOGAGENT_APP_DIR}/data"
  max_upload_bytes: 2147483648
  max_chunk_bytes: 524288

auth:
  api_keys:
    - name: "webui"
      value_env: "LOGAGENT_NATIVE_API_KEY"

log_analyzer:
  max_matches: 200
  keywords:
    - error
    - exception
    - timeout
    - fail
    - failed
    - panic
    - fatal
    - refused
    - denied
    - verify
    - flux
    - influxql
    - "\"query\""
    - duration_ms
    - select
    - show
    - query
    - large_limit
    - no_time_filter

# Tool binaries are built by scripts/build-tools.sh (Linux/macOS) or
# scripts/build-tools.ps1 (Windows). On Windows the binaries carry a `.exe`
# suffix, so append it to each `path` below (or switch a tool to `path_env`).
tools:
  flux_query_analyzer:
    enabled: true
    path: "${LOGAGENT_APP_DIR}/bin/tools/flux_query_analyzer"
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 3
    args:
      - "--input"
      - "{input_file}"
      - "--format"
      - "json"
      - "--top-k"
      - "20"
      - "--max-input-lines"
      - "100000"
      - "--max-error-findings"
      - "20"
    match:
      file_patterns:
        - "*.jsonl"
        - "*.ndjson"
      keywords:
        - "flux"
        - "\"query\""
        - "duration_ms"

  influxql_analyzer:
    enabled: true
    path: "${LOGAGENT_APP_DIR}/bin/tools/influxql-analyzer"
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 3
    args:
      - "-input"
      - "{input_file}"
      - "-output"
      - "json"
      - "-detail-limit"
      - "5"
    match:
      file_patterns:
        - "*.jsonl"
      keywords:
        - "influxql"
        - "\"query\""
        - "select"
        - "show series"
        - "show measurements"

  opengemini_storage_analyzer:
    enabled: true
    path: "${LOGAGENT_APP_DIR}/bin/tools/opengemini-storage-analyzer"
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 10
    args:
      - "--input"
      - "{input_file}"
      - "--format"
      - "json"
    match:
      file_patterns:
        - "*.tssp"
        - "*.tssp.init"
        - "metadata.json"
        - "metaindex.bin"
        - "index.bin"
        - "items.bin"
        - "lens.bin"
        - "*_mergeset.bf"
        - "*_mergeset.bf.last"
        - "*_mergeset.bf.init"
      keywords:
        - "tssp"
        - "mergeset"
        - "metadata.json"
        - "invalid file"
        - "open tssp"

  influxdb_storage_analyzer:
    enabled: true
    path: "${LOGAGENT_APP_DIR}/bin/tools/influxdb_storage_analyzer"
    timeout_seconds: 60
    max_output_bytes: 1048576
    max_input_files: 5
    args:
      - "-input"
      - "{input_file}"
      - "-kind"
      - "auto"
      - "-max-samples"
      - "10"
    match:
      file_patterns:
        - "*.tsm"
        - "*.tsi"
      keywords:
        - "_series"
        - "tsm"
        - "tsi"
        - "series file"

# Command templates referenced by dev_selftest test suites (`suite.command`).
remote_execution:
  commands: {}

mcp:
  enabled: true
  transport: "stdio"
  # For direct remote exposure (not SSH tunnel): set TLS upstream and list allowed origins.
  # allowed_origins:
  #   - "https://mcp.example.invalid"

# Dev self-test pipeline (Linux docker closed loop). Disabled by default — see
# examples/server-dev-selftest.yaml for the full profile shape.
dev_selftest:
  enabled: false
