server:
  bind: "0.0.0.0:50992"
  public_base_url: "http://127.0.0.1:50992"
  max_concurrent_tasks: 2

storage:
  data_dir: "${LOGAGENT_APP_DIR}/data"
  max_upload_bytes: 2147483648
  max_chunk_bytes: 524288

skills:
  enabled: true
  roots:
    - "${LOGAGENT_APP_DIR}/skills"
  max_skill_chars: 4000
  max_reference_chars: 20000

auth:
  api_keys:
    - name: "webui"
      value_env: "LOGAGENT_NATIVE_API_KEY"

log_analyzer:
  max_matches: 200
  keywords:
    - error
    - exception
    - timeout
    - fail
    - failed
    - panic
    - fatal
    - refused
    - denied
    - verify
    - flux
    - influxql
    - "\"query\""
    - duration_ms
    - select
    - show
    - query
    - large_limit
    - no_time_filter

tools:
  flux_query_analyzer:
    enabled: true
    path: "${LOGAGENT_APP_DIR}/bin/tools/flux_query_analyzer"
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 3
    args:
      - "--input"
      - "{input_file}"
      - "--format"
      - "json"
      - "--top-k"
      - "20"
      - "--max-input-lines"
      - "100000"
      - "--max-error-findings"
      - "20"
    match:
      file_patterns:
        - "*.jsonl"
        - "*.ndjson"
      keywords:
        - "flux"
        - "\"query\""
        - "duration_ms"

  influxql_analyzer:
    enabled: true
    path: "${LOGAGENT_APP_DIR}/bin/tools/influxql-analyzer"
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 3
    args:
      - "-input"
      - "{input_file}"
      - "-output"
      - "json"
      - "-detail-limit"
      - "5"
    match:
      file_patterns:
        - "*.jsonl"
      keywords:
        - "influxql"
        - "\"query\""
        - "select"
        - "show series"
        - "show measurements"

  opengemini_storage_analyzer:
    enabled: true
    path: "${LOGAGENT_APP_DIR}/bin/tools/opengemini-storage-analyzer"
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 10
    args:
      - "--input"
      - "{input_file}"
      - "--format"
      - "json"
    match:
      file_patterns:
        - "*.tssp"
        - "*.tssp.init"
        - "metadata.json"
        - "metaindex.bin"
        - "index.bin"
        - "items.bin"
        - "lens.bin"
        - "*_mergeset.bf"
        - "*_mergeset.bf.last"
        - "*_mergeset.bf.init"
      keywords:
        - "tssp"
        - "mergeset"
        - "metadata.json"
        - "invalid file"
        - "open tssp"

  influxdb_storage_analyzer:
    enabled: true
    path: "${LOGAGENT_APP_DIR}/bin/tools/influxdb_storage_analyzer"
    timeout_seconds: 60
    max_output_bytes: 1048576
    max_input_files: 5
    args:
      - "-input"
      - "{input_file}"
      - "-kind"
      - "auto"
      - "-max-samples"
      - "10"
    match:
      file_patterns:
        - "*.tsm"
        - "*.tsi"
      keywords:
        - "_series"
        - "tsm"
        - "tsi"
        - "series file"

remote_execution:
  enabled: true
  ssh_binary: "/usr/bin/ssh"
  host_key_policy: "accept-new"
  connect_timeout_seconds: 10
  command_timeout_seconds: 30
  max_output_bytes: 1048576
  commands:
    smoke_ls_root:
      display_name: "Smoke: list /root"
      description: "Low-risk SSH smoke command for managed ECS executors."
      argv: ["ls", "-la", "/root"]
      timeout_seconds: 10

analysis:
  max_rounds: 4
  max_llm_calls: 4
  max_actions: 6
  max_repeated_action_fingerprints: 1

embedding:
  enabled: false
  provider: "openai_compatible"
  model: "text-embedding-3-small"
  api_key_env: "LOGAGENT_EMBEDDING_API_KEY"
  store: "sqlite"

llm:
  provider: "openai_compatible"
  base_url_env: "LOGAGENT_LLM_BASE_URL"
  api_key_env: "LOGAGENT_LLM_API_KEY"
  model_env: "LOGAGENT_LLM_MODEL"
  request_timeout_seconds: 120
  max_input_chars: 60000
  max_output_tokens: 4096

claude_code:
  command_path_env: "LOGAGENT_CLAUDE_CODE_PATH"
  default_mode: "diagnose"
  max_session_seconds: 600
  max_output_bytes: 1048576

huawei_cloud:
  package_sync:
    enabled: false
    timeout_seconds: 60
    obs:
      endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
      bucket: "example-bucket"
      object_prefix: "packages"
      access_key_env: "LOGAGENT_HUAWEI_OBS_ACCESS_KEY"
      secret_key_env: "LOGAGENT_HUAWEI_OBS_SECRET_KEY"
      security_token_env: "LOGAGENT_HUAWEI_OBS_SECURITY_TOKEN"
    gaussdb:
      host: "127.0.0.1"
      port: 8000
      database: "postgres"
      user: "gaussdb"
      password_env: "LOGAGENT_HUAWEI_GAUSSDB_PASSWORD"
      sslmode: "disable"

mcp:
  enabled: true
  transport: "stdio"
