# LocalToolHub server config for the dev self-test pipeline (P1: docker closed loop).
# Drive from a remote MCP client (e.g. Claude Code on Windows over an SSH tunnel):
#   sync_workspace -> build -> deploy (docker_cluster) -> run_tests -> runs.get -> report.
#
# All commands/binaries/compose paths must be absolute and are allowlisted here. Tool params
# only select profile ids and carry a runId. Source ingest is a tarball upload or an
# allowlisted git repo+ref; SFTP is not supported.

server:
  bind: "127.0.0.1:50994"
  public_base_url: "http://127.0.0.1:50994"
  max_concurrent_tasks: 2
  max_input_chars: 60000

auth:
  api_keys:
    - name: "native-agent"
      value_env: "LOGAGENT_NATIVE_API_KEY"

storage:
  data_dir: "./data/logagent"
  max_upload_bytes: 2147483648
  max_chunk_bytes: 524288

skills:
  enabled: true
  roots:
    - skills
  max_skill_chars: 4000
  max_reference_chars: 20000

log_analyzer:
  max_matches: 200
  keywords: ["error", "exception", "timeout", "fail", "failed", "panic", "fatal"]

remote_execution:
  enabled: false
  ssh_binary: "/usr/bin/ssh"
  # Command template reused by dev_selftest test suites (docker mode). dev_selftest reads
  # templates via command_template() regardless of remote_execution.enabled, so SSH can stay
  # disabled for a docker-only self-test.
  commands:
    opengemini_smoke:
      display_name: "openGemini smoke (in-container)"
      description: "Run the smoke shell script inside the docker test container."
      enabled: true
      argv: ["sh", "/tests/smoke.sh"]
      timeout_seconds: 180

# Dev self-test pipeline — openGemini docker demo (the validated default).
# Disabled by default so this example loads without docker. To run:
#   1. set enabled: true
#   2. replace /path/to/repo below with the absolute path to this repo
#   3. start the server with docker access (docker group, or `sg docker -c '...'`)
# Intranet overrides (env on the server process): OG_BASE_IMAGE (image name),
# GOPROXY/GOSUMDB (go module source); for an air-gapped git mirror, set the repo
# url below to your internal mirror. See deploy/devselftest/opengemini/README.md.
dev_selftest:
  enabled: false
  build_timeout_seconds: 1800
  max_output_bytes: 8388608
  git:
    enabled: true
    binary: "/usr/bin/git"
    repos:
      - url: "https://github.com/openGemini/openGemini.git"   # intranet: internal git mirror
        refs: ["main"]
  builds:
    opengemini:
      command: ["/path/to/repo/deploy/devselftest/opengemini/build-opengemini.sh"]
      working_dir: ""                                          # source/ is the openGemini root
      artifact_globs: ["build/ts-meta", "build/ts-store", "build/ts-sql"]
      timeout_seconds: 1800
  docker:
    binary: "/usr/bin/docker"
    clusters:
      opengemini_cluster:
        compose_file: "/path/to/repo/deploy/devselftest/opengemini/docker-compose.yml"
        exposed_port: 8086
        health_check:
          cmd: ["curl", "-sf", "http://127.0.0.1:8086/query?q=SHOW+DATABASES"]
          timeout_seconds: 180
  test_suites:
    opengemini_smoke:
      # Docker-executor mode: run_tests dispatches this suite through the executor docker
      # runner (docker run --rm --network host <image> <argv>). argv/timeout come from the
      # referenced command template above; the cluster address is injected as system env
      # (DEVSELFTEST_HOST/PORT, final priority).
      command: opengemini_smoke
      timeout_seconds: 180
      env: {}
      docker:
        image: "alpine:3.20"          # intranet: set image: "${DEVSELFTEST_TEST_IMAGE}" + export it
        network: "host"               # reaches the host-exposed ts-sql port 127.0.0.1:8086
        volumes:
          - "/path/to/repo/deploy/devselftest/opengemini/tests:/tests:ro"

mcp:
  enabled: true
  transport: "stdio"
  # For direct remote exposure (not SSH tunnel): set TLS upstream and list allowed origins.
  # allowed_origins:
  #   - "https://mcp.example.invalid"
