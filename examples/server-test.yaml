server:
  bind: "127.0.0.1:50992"
  public_base_url: "http://127.0.0.1:50992"
  max_concurrent_tasks: 2

storage:
  data_dir: "/tmp/logagent-server-test"
  max_upload_bytes: 2147483648
  max_chunk_bytes: 524288

auth:
  api_keys:
    - name: "native-agent"
      value_env: "LOGAGENT_NATIVE_API_KEY"

log_analyzer:
  max_matches: 200
  keywords:
    - error
    - exception
    - timeout
    - fail
    - failed
    - panic
    - fatal
    - refused
    - denied
    - verify

llm:
  provider: "stub"
  model: "stub"
  request_timeout_seconds: 120
  max_input_chars: 60000
  max_output_tokens: 4096

claude_code:
  command_path_env: "LOGAGENT_CLAUDE_CODE_PATH"
  default_mode: "diagnose"
  max_session_seconds: 120
  max_output_bytes: 1048576

mcp:
  enabled: true
  transport: "stdio"
