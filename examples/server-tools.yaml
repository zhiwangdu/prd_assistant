server:
  bind: "127.0.0.1:50998"
  public_base_url: "http://127.0.0.1:50998"
  max_concurrent_tasks: 2

storage:
  data_dir: "/tmp/logagent-server-tools"
  max_upload_bytes: 2147483648
  max_chunk_bytes: 524288

auth:
  api_keys:
    - name: "webui"
      value_env: "LOGAGENT_NATIVE_API_KEY"

log_analyzer:
  max_matches: 200
  keywords:
    - error
    - exception
    - timeout
    - fail
    - failed
    - panic
    - fatal
    - refused
    - denied
    - verify
    - flux
    - influxql
    - select
    - show
    - query

tools:
  flux_query_analyzer:
    enabled: true
    path_env: "LOGAGENT_TOOL_FLUX_QUERY_ANALYZER"
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 3
    args:
      - "--input"
      - "{input_file}"
      - "--format"
      - "json"
    match:
      file_patterns:
        - "*.flux"
      keywords:
        - "flux"
        - "planner"

  influxql_analyzer:
    enabled: true
    path_env: "LOGAGENT_TOOL_INFLUXQL_ANALYZER"
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 3
    args:
      - "--input"
      - "{input_file}"
      - "--format"
      - "json"
    match:
      file_patterns:
        - "*.sql"
      keywords:
        - "influxql"
        - "select"
        - "show series"
        - "show measurements"

llm:
  provider: "stub"
  model: "stub"
  request_timeout_seconds: 120
  max_input_chars: 60000
  max_output_tokens: 4096
