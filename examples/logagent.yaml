server:
  bind: "127.0.0.1:8080"
  public_base_url: "http://127.0.0.1:8080"
  max_concurrent_tasks: 2
  max_input_chars: 60000

native_agent:
  bind: "127.0.0.1:17321"
  server_base_url: "http://127.0.0.1:8080"
  api_key_env: "LOGAGENT_NATIVE_API_KEY"
  allowed_dirs:
    - "~/Downloads"
    - "./testing/fixtures/downloads"
  allowed_suffixes:
    - ".log"
    - ".txt"
    - ".zip"
    - ".tar.gz"
    - ".tgz"
    - ".tar"
  request_timeout_seconds: 300
  upload_chunk_bytes: 524288
  state_path: "~/.logagent/native-agent-state.json"

storage:
  data_dir: "./data/logagent"
  max_upload_bytes: 2147483648
  max_chunk_bytes: 524288

skills:
  enabled: true
  roots:
    - skills
  max_skill_chars: 4000
  max_reference_chars: 20000

auth:
  api_keys:
    - name: "native-agent"
      value_env: "LOGAGENT_NATIVE_API_KEY"

log_analyzer:
  max_matches: 200
  keywords:
    - error
    - exception
    - timeout
    - fail
    - failed
    - panic
    - fatal
    - refused
    - denied
    - verify

# Tool catalog. Every tool is declared here so the server's catalog includes
# all tools out of the box on both Linux and Windows. Tools are disabled by
# default so this example loads without the external binaries present.
# To enable a tool: set its `path_env` env var to the absolute binary path
# (append `.exe` on Windows) and flip `enabled: true`.
tools:
  pprof_analyzer:
    # path_env points at the Go binary (`go`), used to run `go tool pprof`.
    enabled: false
    path_env: LOGAGENT_GO_BINARY
    timeout_seconds: 60
    max_output_bytes: 1048576
    max_input_files: 1
    args: []
    match:
      file_patterns: ["*.pprof", "*.prof", "*.profile", "*.pb.gz"]
      keywords: []

  flux_query_analyzer:
    enabled: false
    path_env: LOGAGENT_FLUX_QUERY_ANALYZER_PATH
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 3
    args:
      - "--input"
      - "{input_file}"
      - "--format"
      - "json"
      - "--top-k"
      - "20"
      - "--max-input-lines"
      - "100000"
      - "--max-error-findings"
      - "20"
    match:
      file_patterns: ["*.jsonl", "*.ndjson"]
      keywords: ["flux", "\"query\"", "duration_ms"]

  # The built-in `logagent.batch_influxql_analysis` tool drives this analyzer
  # (batch upload -> preprocess -> analyze). Enable it to make the batch tool runnable.
  influxql_analyzer:
    enabled: false
    path_env: LOGAGENT_INFLUXQL_ANALYZER_PATH
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 3
    args:
      - "-input"
      - "{input_file}"
      - "-output"
      - "json"
      - "-detail-limit"
      - "5"
    match:
      file_patterns: ["*.jsonl"]
      keywords: ["influxql", "\"query\"", "select", "show series", "show measurements"]

  opengemini_storage_analyzer:
    enabled: false
    path_env: LOGAGENT_OPENGEMINI_STORAGE_ANALYZER_PATH
    timeout_seconds: 30
    max_output_bytes: 1048576
    max_input_files: 10
    args:
      - "--input"
      - "{input_file}"
      - "--format"
      - "json"
    match:
      file_patterns:
        - "*.tssp"
        - "*.tssp.init"
        - "metadata.json"
        - "metaindex.bin"
        - "index.bin"
        - "items.bin"
        - "lens.bin"
        - "*_mergeset.bf"
        - "*_mergeset.bf.last"
        - "*_mergeset.bf.init"
      keywords: ["tssp", "mergeset", "metadata.json", "invalid file", "open tssp"]

  influxdb_storage_analyzer:
    enabled: false
    path_env: LOGAGENT_INFLUXDB_STORAGE_ANALYZER_PATH
    timeout_seconds: 60
    max_output_bytes: 1048576
    max_input_files: 5
    args:
      - "-input"
      - "{input_file}"
      - "-kind"
      - "auto"
      - "-max-samples"
      - "10"
    match:
      file_patterns: ["*.tsm", "*.tsi"]
      keywords: ["_series", "tsm", "tsi", "series file"]

remote_execution:
  enabled: true
  # ssh_binary defaults to /usr/bin/ssh on Linux and
  # C:\Windows\System32\OpenSSH\ssh.exe on Windows; set explicitly to override.
  host_key_policy: "accept-new"
  connect_timeout_seconds: 10
  command_timeout_seconds: 30
  max_output_bytes: 1048576
  commands:
    smoke_ls_root:
      display_name: "Smoke: list /root"
      description: "Low-risk SSH smoke command for managed ECS executors."
      argv: ["ls", "-la", "/root"]
      timeout_seconds: 10

huawei_cloud:
  package_sync:
    enabled: false
    timeout_seconds: 60
    obs:
      endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
      bucket: "example-bucket"
      object_prefix: "packages"
      access_key_env: "LOGAGENT_HUAWEI_OBS_ACCESS_KEY"
      secret_key_env: "LOGAGENT_HUAWEI_OBS_SECRET_KEY"
      security_token_env: "LOGAGENT_HUAWEI_OBS_SECURITY_TOKEN"
    gaussdb:
      host: "127.0.0.1"
      port: 8000
      database: "postgres"
      user: "gaussdb"
      password_env: "LOGAGENT_HUAWEI_GAUSSDB_PASSWORD"
      sslmode: "disable"
  # GeminiDB Influx (NoSQL) instance-management tools: create / delete / list /
  # rename / toggle-SSL / restart. Disabled by default. endpoint + project_id are
  # config defaults and may be overridden per run via each tool's params. Request
  # paths and bodies follow HuaweiCloud NoSQL API v3; X-Auth-Token is read from
  # env only. See skills/geminidb-influx-instance-mgmt.
  gemini_db:
    enabled: false
    timeout_seconds: 60
    endpoint: "https://nosql.cn-north-4.myhuaweicloud.com"
    project_id_env: "LOGAGENT_HUAWEI_GEMINI_DB_PROJECT_ID"
    auth_token_env: "LOGAGENT_HUAWEI_GEMINI_DB_TOKEN"
    region: "cn-north-4"

mcp:
  enabled: true
  transport: "stdio"
  # When exposing /api/mcp directly (not over an SSH tunnel), require TLS upstream and
  # list allowed browser origins here; empty disables the Origin check (localhost/tunnel).
  # allowed_origins:
  #   - "https://mcp.example.invalid"

# Dev self-test pipeline (P1: docker closed loop). Disabled by default — flip enabled and
# see examples/server-dev-selftest.yaml for the full profile shape.
dev_selftest:
  enabled: false
