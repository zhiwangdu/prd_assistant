server:
  bind: "127.0.0.1:8080"
  public_base_url: "http://127.0.0.1:8080"
  max_concurrent_tasks: 2

native_agent:
  bind: "127.0.0.1:17321"
  server_base_url: "http://127.0.0.1:8080"
  api_key_env: "LOGAGENT_NATIVE_API_KEY"
  allowed_dirs:
    - "~/Downloads"
    - "./testing/fixtures/downloads"
  allowed_suffixes:
    - ".log"
    - ".txt"
    - ".zip"
    - ".tar.gz"
    - ".tgz"
    - ".tar"
  request_timeout_seconds: 300
  upload_chunk_bytes: 524288
  state_path: "~/.logagent/native-agent-state.json"

storage:
  data_dir: "./data/logagent"
  max_upload_bytes: 2147483648
  max_chunk_bytes: 524288

auth:
  api_keys:
    - name: "native-agent"
      value_env: "LOGAGENT_NATIVE_API_KEY"

log_analyzer:
  max_matches: 200
  keywords:
    - error
    - exception
    - timeout
    - fail
    - failed
    - panic
    - fatal
    - refused
    - denied
    - verify

llm:
  provider: "stub"
  model: "stub"
  request_timeout_seconds: 120
  max_input_chars: 60000
  max_output_tokens: 4096

agent_backends:
  default_backend: "internal_llm"
  backends:
    internal_llm:
      type: "internal_llm"
      enabled: true
    codex_cli:
      type: "codex_cli"
      enabled: false
      command_path_env: "LOGAGENT_AGENT_CODEX_PATH"
    claude_code_cli:
      type: "claude_code_cli"
      enabled: false
      command_path_env: "LOGAGENT_AGENT_CLAUDE_CODE_PATH"
    opencode_cli:
      type: "opencode_cli"
      enabled: false
      command_path_env: "LOGAGENT_AGENT_OPENCODE_PATH"
