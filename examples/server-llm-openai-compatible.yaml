server:
  bind: "127.0.0.1:50994"
  public_base_url: "http://127.0.0.1:50994"
  max_concurrent_tasks: 2

storage:
  data_dir: "/tmp/logagent-server-llm"
  max_upload_bytes: 2147483648
  max_chunk_bytes: 524288

auth:
  api_keys:
    - name: "webui"
      value_env: "LOGAGENT_NATIVE_API_KEY"

log_analyzer:
  max_matches: 200
  keywords:
    - error
    - exception
    - timeout
    - fail
    - failed
    - panic
    - fatal
    - refused
    - denied
    - verify

llm:
  provider: "openai_compatible"
  base_url_env: "LOGAGENT_LLM_BASE_URL"
  api_key_env: "LOGAGENT_LLM_API_KEY"
  model_env: "LOGAGENT_LLM_MODEL"
  request_timeout_seconds: 120
  max_input_chars: 60000
  max_output_tokens: 4096
