native_agent:
  bind: "127.0.0.1:17321"
  server_base_url: "http://127.0.0.1:50993"
  server_api: "v2"
  api_key_env: "LOGAGENT_NATIVE_API_KEY"
  allowed_dirs:
    - "~/Downloads"
    - "./testing/fixtures/downloads"
  allowed_suffixes:
    - ".log"
    - ".txt"
    - ".zip"
    - ".tar.gz"
    - ".tgz"
    - ".tar"
  request_timeout_seconds: 300
  upload_chunk_bytes: 524288
  state_path: "~/.logagent/native-agent-state-v2.json"

storage:
  max_upload_bytes: 2147483648
