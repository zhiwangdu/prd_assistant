<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LogAgent</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">LA</div>
          <div>
            <h1>LogAgent</h1>
            <p>Evidence Console</p>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-item active" type="button" data-view="import">导入</button>
          <button class="nav-item" type="button" data-view="tasks">任务</button>
          <button class="nav-item" type="button" data-view="evidence">证据</button>
        </nav>
        <div class="side-status">
          <span id="healthDot" class="dot muted"></span>
          <span id="healthText">未检查</span>
        </div>
      </aside>

      <main class="main">
        <section class="topbar">
          <div>
            <h2>故障日志分析</h2>
            <p id="serverHint">连接当前 Server</p>
          </div>
          <button id="checkHealth" class="button secondary" type="button">检查健康</button>
        </section>

        <section class="panel" data-panel="import">
          <div class="panel-header">
            <div>
              <h3>上传日志包</h3>
              <p>支持 .log .txt .zip .tar.gz .tgz .tar</p>
            </div>
          </div>
          <div class="form-grid">
            <label>
              <span>API Key</span>
              <input id="apiKey" type="password" autocomplete="off" placeholder="LOGAGENT_NATIVE_API_KEY">
            </label>
            <label>
              <span>来源 URL</span>
              <input id="sourceUrl" type="url" placeholder="https://logs.example.com/download/...">
            </label>
            <label class="wide">
              <span>日志文件</span>
              <input id="fileInput" type="file">
            </label>
          </div>
          <div class="actions">
            <button id="uploadAndRun" class="button primary" type="button">上传并创建任务</button>
            <button id="loadArtifacts" class="button secondary" type="button">读取任务产物</button>
          </div>
          <div class="progress">
            <div id="progressBar"></div>
          </div>
          <pre id="statusLog" class="status-log">等待操作</pre>
        </section>

        <section class="panel hidden" data-panel="tasks">
          <div class="panel-header">
            <div>
              <h3>本机任务</h3>
              <p>浏览器本地记录</p>
            </div>
            <button id="clearTasks" class="button secondary" type="button">清空</button>
          </div>
          <div id="taskList" class="task-list"></div>
        </section>

        <section class="panel hidden" data-panel="evidence">
          <div class="panel-header">
            <div>
              <h3>证据链</h3>
              <p id="activeTaskLabel">未选择任务</p>
            </div>
          </div>
          <div class="evidence-grid">
            <div class="evidence-block">
              <h4>文件清单</h4>
              <div id="manifestFiles" class="table-like empty">暂无数据</div>
            </div>
            <div class="evidence-block">
              <h4>grep 命中</h4>
              <div id="grepMatches" class="table-like empty">暂无数据</div>
            </div>
          </div>
          <details class="raw-json">
            <summary>原始 JSON</summary>
            <pre id="rawArtifacts">{}</pre>
          </details>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
